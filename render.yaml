# ============================================================================
# ONX Intelligence — Render Blueprint (Pilot Deployment)
# Civilization-Scale Intelligence Operating System v1.0
# ============================================================================
# This blueprint deploys ONX Universal on Render.com with:
#   - SQLite database (persistent disk)
#   - Mock Email service (pilot mode)
#   - Single Web Service (Node.js)
#   - Auto-deploy from GitHub
# ============================================================================

services:
  # ---- Main Web Service ----
  - type: web
    name: onx-intelligence-clean
    runtime: node
    plan: standard
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production npm start
    numInstances: 1
    healthCheckPath: /api/trpc/health.ping
    disk:
      name: onx-data
      mountPath: /app/db
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: sqlite:///app/db/onx-pilot.db
      - key: DATABASE_PROVIDER
        value: sqlite
      - key: OPENAI_API_KEY
        sync: false
      - key: OWNER_UNION_ID
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://onx-intelligence-clean.onrender.com
      - key: VITE_APP_ID
        sync: false
      - key: VITE_KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_OPEN_URL
        value: https://open.kimi.com
      # Pilot: Mock Email (no SMTP needed)
      - key: EMAIL_PROVIDER
        value: mock
      - key: MOCK_EMAIL_ENABLED
        value: "true"
      # AI Providers
      - key: AI_PRIMARY_PROVIDER
        value: openai
      - key: AI_FALLBACK_PROVIDERS
        value: openai
      # Security
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      - key: SESSION_MAX_AGE_MS
        value: "2592000000"
      # Feature Flags
      - key: FEATURE_TITAN_BRIDGE
        value: "true"
      - key: FEATURE_CONSTITUTION_GUARDIAN
        value: "true"
      - key: FEATURE_CONSCIOUSNESS_SCHEDULER
        value: "true"
      - key: FEATURE_CIVILIZATION_PROGRAMS
        value: "true"
      - key: FEATURE_SKILLS_REGISTRY
        value: "true"
      - key: FEATURE_VET_INTELLIGENCE
        value: "true"
      - key: FEATURE_KNOWLEDGE_BASE
        value: "true"
      - key: PRESERVE_DB_ON_DEPLOY
        value: "true"
      # Platform↔Intelligence Bridge (locked by default until V6 gate approval)
      - key: BRIDGE_ENABLED
        value: "false"
      - key: BRIDGE_SHARED_SECRET
        sync: false

  # ---- Staging Environment ----
  - type: web
    name: onx-intelligence-staging
    runtime: node
    plan: starter
    region: frankfurt
    branch: onxos-fix-render-build-deps
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=staging npm start
    numInstances: 1
    healthCheckPath: /api/trpc/health.ping
    disk:
      name: onx-staging-data
      mountPath: /app/db
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: "10000"
      - key: STAGING
        value: "true"
      - key: DATABASE_URL
        value: sqlite:///app/db/onx-staging.db
      - key: DATABASE_PROVIDER
        value: sqlite
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://onx-intelligence-staging.onrender.com
      - key: FEATURE_TITAN_BRIDGE
        value: "true"
      - key: FEATURE_CONSTITUTION_GUARDIAN
        value: "true"
      - key: FEATURE_CONSCIOUSNESS_SCHEDULER
        value: "true"
      - key: FEATURE_VET_INTELLIGENCE
        value: "true"
      - key: FEATURE_KNOWLEDGE_BASE
        value: "true"
      # Platform↔Intelligence Bridge (locked by default until V6 gate approval)
      - key: BRIDGE_ENABLED
        value: "false"
      - key: BRIDGE_SHARED_SECRET
        sync: false

  # ---- Optional: Background Worker (Consciousness Scheduler) ----
  - type: worker
    name: onx-scheduler
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production node dist/scheduler-worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: web
          name: onx-intelligence-clean
          envVarKey: DATABASE_URL
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: onx-intelligence-clean
          envVarKey: OPENAI_API_KEY
    autoDeploy: false
