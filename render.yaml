services:
  - type: web
    name: onx-intelligence-clean
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: onx-intelligence-clean
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h

databases:
  - name: onx-intelligence-clean
    plan: standard
    ipAllowList: []
