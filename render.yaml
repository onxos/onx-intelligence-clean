services:
  - type: web
    name: onx-intelligence-clean
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: onx-intelligence-clean
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 24h
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: SQUARE_WEBHOOK_SIGNATURE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: onx-intelligence-clean
    plan: standard
    ipAllowList: []
