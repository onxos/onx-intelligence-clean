# ============================================================================
# ONX Intelligence — Render Blueprint (Pilot Deployment)
# Civilization-Scale Intelligence Operating System v1.0
# ============================================================================
# This blueprint deploys ONX Universal on Render.com with:
#   - Postgres database (coordinator-ratified STE-01 W2; URL set in Dashboard)
#   - Mock Email service (pilot mode)
#   - Single Web Service (Node.js)
#   - Auto-deploy from GitHub
# ============================================================================

services:
  # ---- Main Web Service ----
  - type: web
    name: onx-intelligence-clean
    runtime: node
    plan: standard
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production npm start
    numInstances: 1
    healthCheckPath: /api/trpc/health.ping
    disk:
      name: onx-data
      mountPath: /app/db
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # STE-01 W2 (coordinator-ratified): production DB = Postgres, matching
      # the three live pg stores (platform-inbox-store, iurg-pg-store,
      # persistent-memory). Set the real postgres:// URL in the Render
      # Dashboard — never committed here. The old sqlite:// value was dead:
      # no store could actually use it.
      - key: DATABASE_URL
        sync: false
      # Optional split inbox DB; falls back to DATABASE_URL when unset
      # (api/lib/platform-inbox-store.ts:13).
      - key: PLATFORM_INBOX_DATABASE_URL
        sync: false
      # DOCUMENTED-ONLY: not read by code yet (no process.env.DATABASE_PROVIDER)
      - key: DATABASE_PROVIDER
        value: postgres
      # C-4 Data residency: declared region (read by api/lib/env.ts). Keep in
      # sync with the `region:` of this service. See DEPLOYMENT_GUIDE.md for
      # the in-Kingdom residency plan / legal transfer basis.
      - key: DATA_REGION
        value: ksa-central
      - key: OPENAI_API_KEY
        sync: false
      - key: OWNER_UNION_ID
        sync: false
      - key: APP_ID
        sync: false
      - key: APP_SECRET
        sync: false
      # DOCUMENTED-ONLY: not read by code yet (sessions sign with APP_SECRET)
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://onx-intelligence-clean.onrender.com
      - key: VITE_APP_ID
        sync: false
      - key: VITE_KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_AUTH_URL
        value: https://auth.kimi.com
      - key: KIMI_OPEN_URL
        value: https://open.kimi.com
      # DOCUMENTED-ONLY: not read by code yet — Pilot: Mock Email (no SMTP needed)
      - key: EMAIL_PROVIDER
        value: mock
      # DOCUMENTED-ONLY: not read by code yet
      - key: MOCK_EMAIL_ENABLED
        value: "true"
      # AI Providers — DOCUMENTED-ONLY: not read by code yet (provider is
      # OpenAI-only via OPENAI_API_KEY)
      - key: AI_PRIMARY_PROVIDER
        value: openai
      # DOCUMENTED-ONLY: not read by code yet
      - key: AI_FALLBACK_PROVIDERS
        value: openai
      # Security — DOCUMENTED-ONLY: not read by code yet (rate limiting is
      # in-process in advanced-engines-router)
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      # DOCUMENTED-ONLY: not read by code yet
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "100"
      # DOCUMENTED-ONLY: not read by code yet
      - key: SESSION_MAX_AGE_MS
        value: "2592000000"
      # Feature Flags — DOCUMENTED-ONLY: none of the FEATURE_* flags are read
      # by code yet; kept (no scope reduction) to be wired in later waves.
      - key: FEATURE_TITAN_BRIDGE
        value: "true"
      - key: FEATURE_CONSTITUTION_GUARDIAN
        value: "true"
      - key: FEATURE_CONSCIOUSNESS_SCHEDULER
        value: "true"
      - key: FEATURE_CIVILIZATION_PROGRAMS
        value: "true"
      - key: FEATURE_SKILLS_REGISTRY
        value: "true"
      - key: FEATURE_VET_INTELLIGENCE
        value: "true"
      - key: FEATURE_KNOWLEDGE_BASE
        value: "true"
      # DOCUMENTED-ONLY: not read by code yet
      - key: PRESERVE_DB_ON_DEPLOY
        value: "true"
      # Platform↔Intelligence Bridge (locked by default until V6 gate approval)
      - key: BRIDGE_ENABLED
        value: "false"
      - key: BRIDGE_SHARED_SECRET
        sync: false

  # ---- Staging Environment ----
  - type: web
    name: onx-intelligence-staging
    runtime: node
    plan: starter
    region: frankfurt
    # STE-01 W2: was onxos-fix-render-build-deps (stale merged branch); staging
    # now tracks the default branch.
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=staging npm start
    numInstances: 1
    healthCheckPath: /api/trpc/health.ping
    disk:
      name: onx-staging-data
      mountPath: /app/db
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: staging
      - key: PORT
        value: "10000"
      - key: STAGING
        value: "true"
      # STE-01 W2 (coordinator-ratified): staging DB = Postgres too; the old
      # sqlite:// value was unusable by the live pg stores. Set in Dashboard.
      - key: DATABASE_URL
        sync: false
      # DOCUMENTED-ONLY: not read by code yet
      - key: DATABASE_PROVIDER
        value: postgres
      # C-4 Data residency: declared region (read by api/lib/env.ts).
      - key: DATA_REGION
        value: ksa-central
      - key: OPENAI_API_KEY
        sync: false
      # DOCUMENTED-ONLY: not read by code yet (sessions sign with APP_SECRET)
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        value: https://onx-intelligence-staging.onrender.com
      # Feature Flags — DOCUMENTED-ONLY: not read by code yet
      - key: FEATURE_TITAN_BRIDGE
        value: "true"
      - key: FEATURE_CONSTITUTION_GUARDIAN
        value: "true"
      - key: FEATURE_CONSCIOUSNESS_SCHEDULER
        value: "true"
      - key: FEATURE_VET_INTELLIGENCE
        value: "true"
      - key: FEATURE_KNOWLEDGE_BASE
        value: "true"
      # Platform↔Intelligence Bridge (locked by default until V6 gate approval)
      - key: BRIDGE_ENABLED
        value: "true"
      - key: BRIDGE_SHARED_SECRET
        sync: false

  # ---- Optional: Background Worker (Consciousness Scheduler) ----
  - type: worker
    name: onx-scheduler
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: NODE_ENV=production node dist/scheduler-worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromService:
          type: web
          name: onx-intelligence-clean
          envVarKey: DATABASE_URL
      - key: OPENAI_API_KEY
        fromService:
          type: web
          name: onx-intelligence-clean
          envVarKey: OPENAI_API_KEY
    autoDeploy: false

  # ---- Daily PostgreSQL backup (DR-01; RPO 24h) ----
  - type: cron
    name: onx-pg-backup
    runtime: node
    plan: starter
    region: frankfurt
    schedule: "0 3 * * *"
    buildCommand: npm ci
    startCommand: node scripts/backup-pg.mjs
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: auto
