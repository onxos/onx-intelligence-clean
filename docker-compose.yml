version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:10000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/onx?schema=public
      - JWT_SECRET=onx-jwt-dev-secret-change-in-production
      - NODE_ENV=production
      - PORT=10000
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/main"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=onx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
