# ONX Intelligence v1.0 — Docker Compose
# Civilization-Scale Intelligence Operating System

version: '3.8'

services:
  onx-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onx-intelligence
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      - NODE_ENV=production
      - PORT=10000
      - DATABASE_URL=sqlite:///app/db/app.db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OWNER_UNION_ID=${OWNER_UNION_ID}
      - JWT_SECRET=${JWT_SECRET}
      - APP_URL=${APP_URL:-http://localhost:10000}
    volumes:
      - onx-data:/app/db
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:10000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  onx-data:
    driver: local
