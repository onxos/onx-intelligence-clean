name: d12-learning-cycle
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # daily 04:00 UTC
jobs:
  learn:
    runs-on: ubuntu-latest
    env:
      ONX_BRIDGE_KEY: ${{ secrets.ONX_BRIDGE_KEY }}
    steps:
      - name: run D12 learning cycle
        run: |
          echo  | base64 -d > /tmp/c.py
          python3 /tmp/c.py
