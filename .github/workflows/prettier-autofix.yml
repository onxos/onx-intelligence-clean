name: Prettier Auto-fix

on:
  push:
    branches:
      - atlas-v6

jobs:
  prettier-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: atlas-v6
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix Prettier
        run: npx prettier --write "src/**/*.ts" "test/**/*.ts"

      - name: Commit formatting fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "No prettier changes needed" || (git commit -m "style: auto-fix prettier formatting [skip ci]" && git push)