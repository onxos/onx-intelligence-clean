name: Render Deploy - Auto Trigger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Render Inventory & Select Service
        shell: bash
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import json
          import urllib.request
          import urllib.error
          import urllib.parse
          import urllib.parse
          import sys

          api_key = os.environ.get("RENDER_API_KEY", "")
          owner_id = os.environ.get("RENDER_OWNER_ID", "")
          
          if not api_key or not owner_id:
              print("❌ Missing RENDER_API_KEY or RENDER_OWNER_ID")
              sys.exit(1)

          headers = {
              "Authorization": f"Bearer {api_key}",
              "Accept": "application/json",
          }

          def decode_response_body(raw: bytes):
              text = raw.decode("utf-8") if raw else ""
              if not text.strip():
                  return {}
              try:
                  return json.loads(text)
              except Exception:
                  return {"raw": text}

          def fetch_json(url: str):
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return resp.status, decode_response_body(resp.read())
              except urllib.error.HTTPError as e:
                  error_data = decode_response_body(e.read())
                  if not error_data:
                      error_data = {"error": f"HTTP {e.code}: {e.reason}"}
                  return e.code, error_data

          def normalize_database_items(payload):
              if isinstance(payload, dict):
                  for key in ('databases', 'data', 'results', 'items'):
                      if isinstance(payload.get(key), list):
                          payload = payload[key]
                          break
                  else:
                      payload = [payload]

              if not isinstance(payload, list):
                  return []

              normalized = []
              for item in payload:
                  if not isinstance(item, dict):
                      continue
                  candidate = item.get('database') or item.get('postgres') or item
                  if isinstance(candidate, dict) and (
                      candidate.get('id')
                      or candidate.get('name')
                      or candidate.get('databaseName')
                      or candidate.get('plan')
                  ):
                      normalized.append(candidate)
              return normalized
          
          # Debug: print the owner_id and api_key status
          print(f"DEBUG: owner_id = {owner_id}")
          print(f"DEBUG: api_key set = {bool(api_key)}")

          # Try different Render API endpoints
          # First try: /v1/services (without owner_id)
          print("🔍 Fetching Render services...")
          url = f"https://api.render.com/v1/services"
          print(f"DEBUG: URL = {url}")
          status, services_data = fetch_json(url)
          
          if status != 200:
              print(f"❌ Failed to fetch services: HTTP {status}")
              print(json.dumps(services_data, indent=2))
              sys.exit(1)

          services = services_data.get('services', []) if isinstance(services_data, dict) else services_data
          
          # Handle Render API response format: list of {cursor, service} objects
          if isinstance(services, list) and services and 'service' in services[0]:
              services = [s.get('service') for s in services]
          
          # Debug: print the response structure
          print(f"DEBUG: services_data type = {type(services_data)}")
          print(f"DEBUG: services length = {len(services)}")
          if services:
              print(f"DEBUG: first service = {json.dumps(services[0], indent=2)}")
          print(f"DEBUG: full response = {json.dumps(services_data, indent=2)[:2000]}")
          
          # Filter Intelligence services (or look for any service for now)
          intelligence_services = [s for s in services if 'intelligence' in s.get('name', '').lower() or 'onx' in s.get('name', '').lower()]
          
          if len(intelligence_services) < 1:
              print("❌ No Intelligence services found")
              print(f"Available services: {[s.get('name') for s in services]}")
              sys.exit(1)

          print(f"✓ Found {len(intelligence_services)} Intelligence service(s)")
          
          # Fetch databases
          print("🔍 Fetching PostgreSQL databases...")
          db_endpoints = [
              f"https://api.render.com/v1/databases",
              f"https://api.render.com/v1/owners/{owner_id}/databases",
              f"https://api.render.com/v1/postgres?ownerId={owner_id}",
              f"https://api.render.com/v1/postgres?owner_id={owner_id}",
          ]

          databases = []
          for url_db in db_endpoints:
              print(f"DEBUG: DB URL = {url_db}")
              status, db_data = fetch_json(url_db)
              if status == 200:
                  databases = normalize_database_items(db_data)
                  if databases:
                      break
              else:
                  print(f"⚠️ Database endpoint returned HTTP {status}: {url_db}")
          
          intelligence_dbs = [d for d in databases if 'intelligence' in d.get('name', '').lower() or 'onx' in d.get('name', '').lower()]
          if not intelligence_dbs and databases:
              print("⚠️ No ONX-named database found; will select best available PostgreSQL database in a later step")
          print(f"✓ Found {len(intelligence_dbs)} Intelligence database(s)")
          
          # Save for next step
          with open('/tmp/render-services.json', 'w') as f:
              json.dump({
                  'services': intelligence_services,
                  'databases': intelligence_dbs,
                  'all_services': services,
                  'all_databases': databases
              }, f, indent=2)
          
          print("\n" + "="*80)
          print("RENDER SERVICES & DATABASES")
          print("="*80)
          
          print("\n📦 Services:")
          for i, svc in enumerate(intelligence_services, 1):
              repo = svc.get('repo', 'N/A')
              branch = svc.get('branch', 'N/A')
              status = svc.get('status', 'N/A')
              print(f"  {i}. {svc.get('name')} (ID: {svc.get('id')})")
              print(f"     Status: {status}")
              print(f"     Repo: {repo} @ {branch}")
          
          print("\n🗄️  Databases:")
          for i, db in enumerate(intelligence_dbs, 1):
              status = db.get('status', 'N/A')
              print(f"  {i}. {db.get('name')} (ID: {db.get('id')})")
              print(f"     Status: {status}")
          PYTHON_SCRIPT

      - name: Analyze & Select Service
        shell: bash
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import sys

          with open('/tmp/render-services.json', 'r') as f:
              data = json.load(f)
          
          services = data['services']
          
          if len(services) == 0:
              print("❌ No services found")
              sys.exit(1)
          
          print("\n" + "="*80)
          print("SERVICE ANALYSIS & SELECTION")
          print("="*80)
          
          # Score each service
          scores = {}
          for svc in services:
              name = svc.get('name')
              score = 0
              
              # Repository check
              repo = svc.get('repo', '')
              if 'onx-intelligence-clean' in repo:
                  score += 40
              elif 'onx-intelligence' in repo:
                  score += 20
              
              # Branch check
              branch = svc.get('branch', '')
              if branch == 'main':
                  score += 30
              
              # Status check
              status = svc.get('status', '').lower()
              if status in ['active', 'available']:
                  score += 20
              elif status in ['building', 'deploying']:
                  score += 10
              
              scores[name] = {
                  'score': score,
                  'service': svc,
                  'repo': repo,
                  'branch': branch,
                  'status': status
              }
          
          # Select best service
          selected_name = max(scores.keys(), key=lambda k: scores[k]['score'])
          
          print(f"\n📊 Scores:")
          for name in sorted(scores.keys(), key=lambda k: scores[k]['score'], reverse=True):
              s = scores[name]
              print(f"  {name}: {s['score']}/100")
              print(f"    Repo: {s['repo']}")
              print(f"    Branch: {s['branch']}")
              print(f"    Status: {s['status']}")
          
          print(f"\n✅ SELECTED: {selected_name}")
          selected_service = scores[selected_name]['service']
          
          # Save selection
          with open('/tmp/selected-service.json', 'w') as f:
              json.dump({
                  'name': selected_name,
                  'id': selected_service.get('id'),
                  'current_repo': selected_service.get('repo'),
                  'current_branch': selected_service.get('branch'),
                  'current_status': selected_service.get('status'),
                  'url': selected_service.get('serviceUrl') or selected_service.get('url'),
                  'region': selected_service.get('region')
              }, f, indent=2)
          
          print(f"\n📝 Service ID: {selected_service.get('id')}")
          print(f"🌐 URL: {selected_service.get('serviceUrl') or selected_service.get('url')}")

      - name: Fetch Database Connection Details
        shell: bash
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import json
          import urllib.request
          import urllib.error

          api_key = os.environ.get("RENDER_API_KEY", "")
          owner_id = os.environ.get("RENDER_OWNER_ID", "")
          
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Accept": "application/json",
          }

          def decode_response_body(raw: bytes):
              text = raw.decode("utf-8") if raw else ""
              if not text.strip():
                  return {}
              try:
                  return json.loads(text)
              except Exception:
                  return {"raw": text}

          def fetch_json(url: str, method='GET', data=None):
              req = urllib.request.Request(url, headers=headers, method=method)
              if data is not None:
                  req.data = json.dumps(data).encode('utf-8')
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return resp.status, decode_response_body(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, decode_response_body(e.read())

          def pick_connection_string(db_details):
              if isinstance(db_details, str) and db_details.startswith('postgres'):
                  return db_details

              if isinstance(db_details, list):
                  for item in db_details:
                      found = pick_connection_string(item)
                      if found:
                          return found
                  return ''

              if not isinstance(db_details, dict):
                  return ''

              for key in ('internalConnectionString', 'connectionString', 'databaseUrl', 'url', 'internalUrl'):
                  value = db_details.get(key, '')
                  if isinstance(value, str) and value.startswith('postgres'):
                      return value

              for nested_key in ('database', 'postgres', 'connectionInfo', 'connections', 'info'):
                  if nested_key in db_details:
                      found = pick_connection_string(db_details.get(nested_key))
                      if found:
                          return found

              for value in db_details.values():
                  found = pick_connection_string(value)
                  if found:
                      return found

              return ''

          def extract_connection_parts(payload, parts=None):
              if parts is None:
                  parts = {}
              if isinstance(payload, dict):
                  for key, value in payload.items():
                      k = key.lower()
                      if k in ('host', 'hostname', 'internalhostname', 'internalhost', 'postgreshostname', 'postgreshost') and isinstance(value, str) and value:
                          if k.startswith('internal'):
                              parts['host'] = value
                          elif 'host' not in parts:
                              parts['host'] = value
                      elif k in ('port',) and value is not None and str(value):
                          parts['port'] = str(value)
                      elif k in ('user', 'username', 'databaseuser', 'dbuser', 'postgresuser') and isinstance(value, str) and value:
                          parts['user'] = value
                      elif k in ('password', 'databasepassword', 'dbpassword', 'postgrespassword') and isinstance(value, str) and value:
                          parts['password'] = value
                      elif k in ('databasename', 'database', 'dbname', 'postgresdatabase') and isinstance(value, str) and value:
                          parts['database'] = value
                      elif isinstance(value, (dict, list)):
                          extract_connection_parts(value, parts)
              elif isinstance(payload, list):
                  for item in payload:
                      extract_connection_parts(item, parts)
              return parts

          def build_connection_string(payload):
              parts = extract_connection_parts(payload)
              required = ('host', 'port', 'user', 'password', 'database')
              if all(parts.get(k) for k in required):
                  user = urllib.parse.quote(parts['user'], safe='')
                  password = urllib.parse.quote(parts['password'], safe='')
                  database = urllib.parse.quote(parts['database'], safe='')
                  return f"postgresql://{user}:{password}@{parts['host']}:{parts['port']}/{database}?schema=public"
              return ''

          with open('/tmp/render-services.json', 'r') as f:
              data = json.load(f)

          with open('/tmp/selected-service.json', 'r') as f:
              selected_service = json.load(f)
          
          databases = data.get('databases', []) or []
          all_databases = data.get('all_databases', []) or []
          service_region = (selected_service.get('region') or '').lower()

          if not databases:
              databases = all_databases

          def score_db(db):
              score = 0
              name = (db.get('name') or '').lower()
              status = (db.get('status') or '').lower()
              region = (db.get('region') or '').lower()
              if 'onx' in name or 'intelligence' in name:
                  score += 50
              if status in ('available', 'active'):
                  score += 20
              if service_region and region == service_region:
                  score += 20
              if region == 'frankfurt':
                  score += 10
              return score
          
          if not databases:
              print("⚠️  No existing databases found. Attempting to create one...")
              create_attempts = [
                  ("https://api.render.com/v1/databases", {
                      'name': 'onx-intelligence-clean-db',
                      'ownerId': owner_id,
                      'region': selected_service.get('region') or 'frankfurt'
                  }),
                  ("https://api.render.com/v1/databases", {
                      'name': 'onx-intelligence-clean-db',
                      'ownerId': owner_id
                  }),
                  ("https://api.render.com/v1/postgres", {
                      'name': 'onx-intelligence-clean-db',
                      'ownerId': owner_id,
                      'region': selected_service.get('region') or 'frankfurt'
                  })
              ]

              created_db = None
              for url, payload in create_attempts:
                  status, resp = fetch_json(url, method='POST', data=payload)
                  print(f"Create DB attempt {url} -> HTTP {status}")
                  if status in (200, 201):
                      created_db = resp.get('database') if isinstance(resp, dict) and isinstance(resp.get('database'), dict) else resp
                      break

              if created_db and isinstance(created_db, dict):
                  databases = [created_db]
                  print(f"✓ Created database: {created_db.get('name')} ({created_db.get('id')})")
              else:
                  print("❌ Unable to create or discover a PostgreSQL database")
                  with open('/tmp/database.json', 'w') as f:
                      json.dump({'name': None, 'id': None, 'connection_string': ''}, f)
                  exit(0)
          
          # Select best candidate database using repo-specific and region preferences
          databases = sorted(databases, key=score_db, reverse=True)
          db = databases[0]
          db_id = db.get('id')
          db_name = db.get('name')
          
          print(f"📦 Database: {db_name} (ID: {db_id})")
          
          connection_string = pick_connection_string(db)

          # Fetch full database details to get connection string when list payload does not include it
          if not connection_string:
              detail_endpoints = [
                  f"https://api.render.com/v1/postgres/{db_id}/connection-info",
                  f"https://api.render.com/v1/databases/{db_id}",
                  f"https://api.render.com/v1/postgres/{db_id}",
                  f"https://api.render.com/v1/databases/{db_id}/connection",
                  f"https://api.render.com/v1/postgres/{db_id}/connectionInfo",
                  f"https://api.render.com/v1/postgres/{db_id}/credentials",
              ]

              for detail_url in detail_endpoints:
                  status, db_details = fetch_json(detail_url)
                  print(f"DEBUG: DB detail endpoint {detail_url} -> HTTP {status}")
                  if status == 200 and db_details:
                      if isinstance(db_details, dict):
                          print(f"DEBUG: DB detail keys from {detail_url}: {list(db_details.keys())[:12]}")
                      connection_string = pick_connection_string(db_details)
                      if not connection_string:
                          connection_string = build_connection_string(db_details)
                      if connection_string:
                          print(f"✓ Database connection string retrieved from {detail_url}")
                          break

          if not connection_string:
              print("⚠️  Database details retrieved but no postgres connection string was exposed by API")
          
          with open('/tmp/database.json', 'w') as f:
              json.dump({
                  'name': db_name,
                  'id': db_id,
                  'connection_string': connection_string
              }, f, indent=2)
          PYTHON_SCRIPT

      - name: Configure & Deploy Service
        shell: bash
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import json
          import urllib.request
          import urllib.error
          import sys

          api_key = os.environ.get("RENDER_API_KEY", "")
          owner_id = os.environ.get("RENDER_OWNER_ID", "")
          
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Accept": "application/json",
              "Content-Type": "application/json",
          }

          def fetch_json(url: str, method='GET', data=None):
              req = urllib.request.Request(url, headers=headers, method=method)
              if data:
                  req.data = json.dumps(data).encode('utf-8')
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read()
                      if not raw:
                          return resp.status, {}
                      try:
                          return resp.status, json.loads(raw.decode("utf-8"))
                      except Exception:
                          return resp.status, {"raw": raw.decode("utf-8", errors='replace')}
              except urllib.error.HTTPError as e:
                  error_data = e.read().decode("utf-8")
                  try:
                      error_json = json.loads(error_data)
                  except:
                      error_json = {'error': error_data}
                  return e.code, error_json

          def has_database_url(service_payload):
              env_vars = service_payload.get('envVars', []) if isinstance(service_payload, dict) else []
              for ev in env_vars:
                  if isinstance(ev, dict) and ev.get('key') == 'DATABASE_URL':
                      return True
              return False

          # Load service info
          with open('/tmp/selected-service.json', 'r') as f:
              service_info = json.load(f)
          
          service_id = service_info['id']
          service_name = service_info['name']
          
          with open('/tmp/database.json', 'r') as f:
              db_info = json.load(f)
          
          print("="*80)
          print("CONFIGURING SERVICE")
          print("="*80)
          
          # Fetch current service details
          print(f"\n🔍 Fetching full service details...")
          status, service_data = fetch_json(f"https://api.render.com/v1/services/{service_id}")
          
          if status != 200:
              print(f"❌ Failed to fetch service: HTTP {status}")
              print(json.dumps(service_data, indent=2))
              sys.exit(1)
          
          print(f"✓ Service retrieved: {service_data.get('name')}")
          
          # Prepare update payload
          update_payload = {
              'envVars': [
                  {'key': 'NODE_ENV', 'value': 'production'},
                  {'key': 'PORT', 'value': '10000'},
                  {'key': 'JWT_EXPIRATION', 'value': '24h'},
              ]
          }
          
          # Add DATABASE_URL if available
          if db_info.get('connection_string'):
              update_payload['envVars'].append({
                  'key': 'DATABASE_URL',
                  'value': db_info['connection_string']
              })
          else:
              print("❌ DATABASE_URL not available from selected database")
              sys.exit(1)
          
          # Add JWT_SECRET if not already set
          current_env = service_data.get('envVars', [])
          has_jwt_secret = any(ev.get('key') == 'JWT_SECRET' for ev in current_env)
          
          if not has_jwt_secret:
              update_payload['envVars'].append({
                  'key': 'JWT_SECRET',
                  'generateValue': True
              })
          else:
              for ev in current_env:
                  if ev.get('key') == 'JWT_SECRET':
                      update_payload['envVars'].append(ev)
                      break
          
          print(f"\n📝 Setting environment variables:")
          for ev in update_payload['envVars']:
              key = ev.get('key')
              if ev.get('generateValue'):
                  print(f"  {key}: [auto-generated]")
              else:
                  value = ev.get('value', '')
                  if len(value) > 50:
                      print(f"  {key}: {value[:50]}...")
                  else:
                      print(f"  {key}: {value}")
          
          print(f"\n🚀 Sending configuration update...")
          status, response = fetch_json(
              f"https://api.render.com/v1/services/{service_id}",
              method='PATCH',
              data=update_payload
          )
          
          if status in [200, 201]:
              print(f"✓ Service configured successfully")
              if isinstance(response, dict):
                  response_env = response.get('envVars', [])
                  if isinstance(response_env, list):
                      keys = [ev.get('key') for ev in response_env if isinstance(ev, dict) and ev.get('key')]
                      print(f"DEBUG: response env keys count={len(keys)} includes DATABASE_URL={'DATABASE_URL' in keys}")
          else:
              print(f"⚠️  Service update returned HTTP {status}")
              print(json.dumps(response, indent=2))

          # Official endpoint from Render API spec: PUT /services/{serviceId}/env-vars with array payload
          env_put_payload = [
              {'key': 'NODE_ENV', 'value': 'production'},
              {'key': 'PORT', 'value': '10000'},
              {'key': 'JWT_EXPIRATION', 'value': '24h'},
              {'key': 'DATABASE_URL', 'value': db_info['connection_string']},
          ]
          if not has_jwt_secret:
              env_put_payload.append({'key': 'JWT_SECRET', 'generateValue': True})

          env_put_status, env_put_response = fetch_json(
              f"https://api.render.com/v1/services/{service_id}/env-vars",
              method='PUT',
              data=env_put_payload
          )
          print(f"Env vars PUT /services/{{serviceId}}/env-vars -> HTTP {env_put_status}")
          if env_put_status not in [200, 201]:
              print(json.dumps(env_put_response, indent=2))

          verify_status, verify_payload = fetch_json(f"https://api.render.com/v1/services/{service_id}")
          database_url_present = verify_status == 200 and has_database_url(verify_payload)
          if not database_url_present:
              print("⚠️ DATABASE_URL could not be confirmed via follow-up GET /services response; continuing with deployment trigger")

          print(f"\n🚀 Triggering Render deployment...")
          deploy_id = None
          deploy_status, deploy_response = fetch_json(
              f"https://api.render.com/v1/services/{service_id}/deploys",
              method='POST',
              data={}
          )

          if deploy_status in [200, 201]:
              print("✓ Deployment triggered successfully")
              deploy_id = deploy_response.get('id') or deploy_response.get('deploy', {}).get('id')
              if deploy_id:
                  print(f"   Deploy ID: {deploy_id}")
          else:
              print(f"⚠️  Deploy trigger returned HTTP {deploy_status}")
              print(json.dumps(deploy_response, indent=2))

          resolved_url = (
              response.get('serviceUrl')
              or response.get('url')
              or service_info.get('url')
              or f"https://{service_name}.onrender.com"
          )
          resolved_status = (
              response.get('status')
              or deploy_response.get('status')
              or service_data.get('status', 'unknown')
          )

          with open('/tmp/deployed-service.json', 'w') as f:
              json.dump({
                  'name': service_name,
                  'id': service_id,
                  'status': resolved_status,
                  'url': resolved_url,
                  'database': db_info.get('name'),
                  'database_id': db_info.get('id'),
                  'deploy_id': deploy_id,
                  'config_update_status': status
              }, f, indent=2)
          PYTHON_SCRIPT

      - name: Wait for Deployment
        shell: bash
        run: |
          echo "⏳ Waiting for deployment to complete..."
          echo "   Checking Render service status every 15 seconds..."
          sleep 30

      - name: Verify Health Check
        shell: bash
        run: |
          python3 << 'PYTHON_SCRIPT'
          import json
          import urllib.request
          import urllib.error
          import time
          import sys

          with open('/tmp/deployed-service.json', 'r') as f:
              service_info = json.load(f)
          
          service_url = service_info.get('url')
          service_name = service_info.get('name')
          
          if not service_url and service_name:
              service_url = f"https://{service_name}.onrender.com"
          
          if not service_url:
              print("⚠️  No service URL available for health check")
              sys.exit(0)
          
          if not service_url.startswith('http'):
              service_url = f"https://{service_url}"
          
          health_url = f"{service_url}/health"
          
          print("="*80)
          print("HEALTH CHECK & VERIFICATION")
          print("="*80)
          print(f"\n🔍 Checking: {health_url}")
          
          max_attempts = 10
          attempt = 0
          
          while attempt < max_attempts:
              attempt += 1
              try:
                  req = urllib.request.Request(health_url, method='GET')
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      if resp.status == 200:
                          data = json.loads(resp.read().decode('utf-8'))
                          app_status = str(data.get('status', '')).lower() if isinstance(data, dict) else ''
                          db_status = str((data.get('database') or {}).get('status', '')).lower() if isinstance(data, dict) else ''
                          if app_status in ('ok', 'healthy', 'up') and db_status in ('ok', 'healthy', 'up'):
                              print(f"\n✅ Health check PASSED (attempt {attempt}/{max_attempts})")
                              print(f"   Status: {resp.status}")
                              print(f"   Response: {json.dumps(data, indent=2)}")
                              break
                          print(f"   Attempt {attempt}: HTTP 200 but service not healthy yet (status={app_status}, database={db_status})")
              except urllib.error.HTTPError as e:
                  if e.code == 200:
                      print(f"✅ Health check PASSED with HTTP {e.code}")
                      break
                  else:
                      print(f"   Attempt {attempt}: HTTP {e.code}")
              except Exception as e:
                  print(f"   Attempt {attempt}: {str(e)[:100]}")
              
              if attempt < max_attempts:
                  print(f"   Retrying in 15 seconds...")
                  time.sleep(15)
          
          if attempt == max_attempts:
              print(f"\n⚠️  Health check not responding after {max_attempts} attempts")
          
          # Check API docs endpoint
          print(f"\n🔍 Checking API docs endpoint...")
          docs_url = f"{service_url}/api/docs"
          try:
              req = urllib.request.Request(docs_url, method='GET')
              with urllib.request.urlopen(req, timeout=10) as resp:
                  if resp.status == 200:
                      print(f"✅ API docs available at {docs_url}")
          except Exception as e:
              print(f"⚠️  API docs not yet available: {str(e)[:100]}")
          PYTHON_SCRIPT

