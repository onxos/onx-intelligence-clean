name: Fix Render Service Settings
on:
  workflow_dispatch:
jobs:
  fix-render:
    runs-on: ubuntu-latest
    steps:
      - name: Show raw service config
        run: |
          echo "=== Render API v1 raw response ==="
          curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg"
          echo ""

      - name: Try PATCH with Render API v1
        run: |
          echo "=== PATCH dockerfilePath ==="
          curl -s -w "\nHTTP:%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"dockerfilePath":"./Dockerfile"}' \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg"
          echo ""

      - name: Trigger deploy via API
        run: |
          echo "=== Trigger deploy ==="
          curl -s -w "\nHTTP:%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg/deploys"
