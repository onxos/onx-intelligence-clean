name: Render Repoint Intel to main
on:
  workflow_dispatch:
jobs:
  repoint:
    runs-on: ubuntu-latest
    steps:
      - name: Get service branch (before)
        run: |
          echo "=== GET service (before) ==="
          RESP=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg")
          BEFORE=$(echo "$RESP" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("branch",""))')
          echo "BEFORE branch: $BEFORE"

      - name: PATCH branch to main
        run: |
          echo "=== PATCH branch=main ==="
          curl -s -w '\nHTTP:%{http_code}' -X PATCH \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d '{"branch":"main"}' \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg"
          echo ""

      - name: Get service branch (after)
        run: |
          echo "=== GET service (after) ==="
          RESP=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg")
          AFTER=$(echo "$RESP" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("branch",""))')
          echo "AFTER branch: $AFTER"

      - name: Trigger deploy
        run: |
          echo "=== Trigger deploy ==="
          curl -s -w '\nHTTP:%{http_code}' -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg/deploys"
          echo ""
