name: set-truth-key
on:
  workflow_dispatch:
jobs:
  set:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
    steps:
      - name: set TRUTH_PAGE_KEY (full-env read-then-write)
        run: |
          echo  | base64 -d > /tmp/c.py
          python3 /tmp/c.py
