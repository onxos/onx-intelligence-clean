name: render-status
on:
  workflow_dispatch:
    inputs:
      service_id:
        description: Render service id (srv-...)
        required: true
jobs:
  status:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      SERVICE_ID: ${{ inputs.service_id }}
    steps:
      - name: list recent deploys
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          KEY = os.environ["RENDER_API_KEY"]; SRV = os.environ["SERVICE_ID"]
          req = urllib.request.Request(f"https://api.render.com/v1/services/{SRV}/deploys?limit=5",
              headers={"Authorization": "Bearer " + KEY})
          ds = json.loads(urllib.request.urlopen(req, timeout=60).read())
          for d in ds:
              dep = d["deploy"]
              print(dep["id"], dep["status"], dep.get("commit",{}).get("id","?")[:10], dep.get("createdAt"))
          req2 = urllib.request.Request(f"https://api.render.com/v1/services/{SRV}",
              headers={"Authorization": "Bearer " + KEY})
          s = json.loads(urllib.request.urlopen(req2, timeout=60).read())
          print("SVC branch:", s.get("branch"), "rootDir:", s.get("rootDir"), "suspended:", s.get("suspended"))
          sd = s.get("serviceDetails", {})
          print("PLAN:", sd.get("plan"), "numInstances:", sd.get("numInstances"), "region:", s.get("region"))
          # Fetch recent logs to diagnose build failures
          try:
              owner = s.get("ownerId") or ""
              if owner:
                  req3 = urllib.request.Request(
                      f"https://api.render.com/v1/logs?ownerId={owner}&resource={SRV}&direction=backward&limit=120&type=build",
                      headers={"Authorization": "Bearer " + KEY, "Accept": "application/json"})
                  logs = json.loads(urllib.request.urlopen(req3, timeout=60).read())
                  for e in logs.get("logs", []):
                      print("LOG:", (e.get("message") or "")[:300])
          except Exception as ex:
              print("logs fetch failed:", ex)
          PY
