name: Fix Staging Bridge Env
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      BRIDGE_KEY: ${{ secrets.BRIDGE_SHARED_SECRET }}
    steps:
      - name: Fix staging bridge env and redeploy
        run: |
          echo  | base64 -d > /tmp/fix.py
          python3 /tmp/fix.py
