name: Check Deploy Status
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest deploy
        run: |
          RESP=$(curl -s -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg/deploys?limit=1")
          echo "$RESP"
          echo "STATUS=$(echo $RESP | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d[0]["deploy"]["status"])')"
