name: Full System Audit
on:
  workflow_dispatch:
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Update Render env vars
        run: |
          # Get existing env vars
          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg/env-vars")

          python3 << 'PYEOF'
          import json, subprocess

          existing_raw = """${{ toJSON(fromJSON('[]')) }}"""
          try:
              resp = subprocess.run([
                  "curl", "-s",
                  "-H", "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}",
                  "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg/env-vars"
              ], capture_output=True, text=True)
              env_list = json.loads(resp.stdout)
          except Exception as e:
              print(f"Error fetching: {e}")
              env_list = []

          env_dict = {}
          for item in env_list:
              ev = item.get("envVar") or item
              k = ev.get("key", "")
              v = ev.get("value", "")
              if k:
                  env_dict[k] = v

          # Set/override known values
          updates = {
              "OPENAI_API_KEY":  "${{ secrets.OPENAI_API_KEY }}",
              "OWNER_UNION_ID":  "${{ secrets.OWNER_UNION_ID }}",
              "APP_ID":          "${{ secrets.KIMI_APP_ID }}",
          }
          for k, v in updates.items():
              if v and v != "":
                  env_dict[k] = v

          payload = [{"key": k, "value": v} for k, v in env_dict.items()]
          print(f"Setting {len(payload)} vars: {[p['key'] for p in payload]}")

          result = subprocess.run([
              "curl", "-s", "-w", "\nHTTP:%{http_code}",
              "-X", "PUT",
              "-H", "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}",
              "-H", "Content-Type: application/json",
              "-d", json.dumps(payload),
              "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg/env-vars"
          ], capture_output=True, text=True)
          last = result.stdout.split('\n')[-1]
          print(f"Result: {last}")
          PYEOF

      - name: Verify env vars in Render
        run: |
          echo "=== Current Render env vars ==="
          curl -s \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/srv-d8vkfs5aeets73d5gkcg/env-vars" \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          keys = []
          for item in d:
              ev = item.get('envVar') or item
              k = ev.get('key','')
              if k: keys.append(k)
          required = ['OPENAI_API_KEY','OWNER_UNION_ID','APP_ID','APP_SECRET','DATABASE_URL','JWT_SECRET','NODE_ENV','PORT']
          print('Set keys:', keys)
          for r in required:
              status = '✅' if r in keys else '❌ MISSING'
              print(f'  {status}  {r}')
          "

      - name: Test all router endpoints
        run: |
          BASE="https://onx-intelligence-clean.onrender.com/api/trpc"
          pass=0; fail=0; results=""

          check() {
            local name=$1; local url=$2
            resp=$(curl -s --max-time 10 "$url" 2>/dev/null) || resp=""
            if echo "$resp" | grep -q '"result"'; then
              results="$results\n  ✅ $name"
              pass=$((pass+1))
            else
              short=$(echo "$resp" | python3 -c "import sys; d=sys.stdin.read(); print(d[:100])" 2>/dev/null || echo "$resp" | cut -c1-100)
              results="$results\n  ❌ $name — $short"
              fail=$((fail+1))
            fi
          }

          I='%7B%22json%22%3A%7B%7D%7D'  # URL-encoded {"json":{}}

          echo "=== Router Health Check ==="
          # Core
          check "01 health.ping"               "$BASE/health.ping"
          check "02 health.live"               "$BASE/health.live"
          check "03 ping"                      "$BASE/ping"
          # Titan
          check "04 titan.listTitans"          "$BASE/titan.listTitans"
          check "05 titan.stats"               "$BASE/titan.stats"
          # Constitution
          check "06 constitution.principles"   "$BASE/constitution.principles"
          # Knowledge
          check "07 knowledge.stats"           "$BASE/knowledge.stats"
          # Skills
          check "08 skills.list"               "$BASE/skills.list"
          # Scheduler
          check "09 scheduler.status"          "$BASE/scheduler.status"
          check "10 scheduler.stats"           "$BASE/scheduler.stats"
          # CEP (Civilizational Excellence)
          check "11 cep.report"                "$BASE/cep.report"
          # OCPP
          check "12 ocpp.measure"              "$BASE/ocpp.measure"
          # CEVP
          check "13 cevp.evolve"               "$BASE/cevp.evolve"
          # CCOP
          check "14 ccop.chain"                "$BASE/ccop.chain"
          # COS
          check "15 cos.status"                "$BASE/cos.status"
          # UCR
          check "16 ucr.certify"               "$BASE/ucr.certify"
          # AI Brain
          check "17 aiBrain.context"           "$BASE/aiBrain.context"
          # Vet Intelligence
          check "18 vet.stats"                 "$BASE/vet.stats"
          # Model Federation
          check "19 modelFederation.providers" "$BASE/modelFederation.providers"
          check "20 modelFederation.health"    "$BASE/modelFederation.health"
          # Model Gateway
          check "21 modelGateway.listProviders" "$BASE/modelGateway.listProviders"
          # Tool Gateway
          check "22 toolGateway.listTools"     "$BASE/toolGateway.listTools"
          # Runtime (nested)
          check "23 runtime.usfipv2.status"    "$BASE/runtime.usfipv2.status"
          check "24 runtime.health.status"     "$BASE/runtime.health.status"
          # Institutional
          check "25 institutional.list"        "$BASE/institutional.list"
          # Intelligence
          check "26 intelligence.list"         "$BASE/intelligence.list"
          # Auth Hardening
          check "27 authHardening.listRoles"   "$BASE/authHardening.listRoles"
          # Titan KB
          check "28 titanKb.stats"             "$BASE/titanKb.stats"
          # Auth
          check "29 auth.me"                   "$BASE/auth.me"

          echo -e "$results"
          echo ""
          echo "=== Summary: $pass passed / $((pass+fail)) total ==="
          [ $fail -eq 0 ] && echo "ALL ROUTERS OK" || echo "WARN: $fail need attention"
