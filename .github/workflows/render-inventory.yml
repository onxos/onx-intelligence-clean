name: Render Inventory & Analysis

on:
  workflow_dispatch:

jobs:
  analyze-services:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_OWNER_ID: ${{ secrets.RENDER_OWNER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Render authentication and inventory resources
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${RENDER_API_KEY:-}" || -z "${RENDER_OWNER_ID:-}" ]]; then
            echo "::error::Missing required GitHub Actions secrets: RENDER_API_KEY and/or RENDER_OWNER_ID."
            exit 1
          fi

          echo "Verifying Render API authentication..."
          auth_code=$(curl -sS -o /tmp/render-owner.json -w '%{http_code}' \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/owners")

          if [[ "$auth_code" =~ ^2 ]]; then
            echo "Authentication successful."
          else
            echo "::error::Render authentication failed. Verify that the GitHub Actions secret RENDER_API_KEY is valid and has access to the owner identified by RENDER_OWNER_ID."
            cat /tmp/render-owner.json
            exit 1
          fi

          python3 - <<'PY'
          import os
          import json
          import sys
          import urllib.request
          import urllib.error

          api_key = os.environ.get("RENDER_API_KEY", "")
          owner_id = os.environ.get("RENDER_OWNER_ID", "")
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Accept": "application/json",
          }

          def fetch_json(url: str):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return resp.status, json.loads(resp.read().decode("utf-8"))

          def fetch_with_fallback(label: str, candidates):
              last_error = None
              for url in candidates:
                  try:
                      status, payload = fetch_json(url)
                      return status, payload
                  except urllib.error.HTTPError as exc:
                      last_error = f"{url} -> HTTP {exc.code}"
                      if exc.code not in (404, 405):
                          raise
                  except Exception as exc:
                      last_error = f"{url} -> {exc}"
                      raise
              if last_error:
                  print(f"[{label}] No matching endpoint responded: {last_error}")
              return None, []

          def pick(item, *keys):
              for key in keys:
                  value = item.get(key)
                  if isinstance(value, str) and value.strip():
                      return value
              return None

          def normalize_resource(kind, item):
              return {
                  "name": pick(item, "name", "serviceName", "displayName", "envGroupName", "databaseName") or item.get("id") or "unknown",
                  "id": item.get("id") or item.get("serviceId") or item.get("databaseId") or None,
                  "type": kind,
                  "status": pick(item, "status", "serviceStatus", "state", "healthStatus"),
                  "repository": pick(item, "repo", "repository", "repoName", "serviceRepo", "repoUrl"),
                  "branch": pick(item, "branch", "defaultBranch", "gitBranch"),
                  "url": pick(item, "url", "serviceUrl", "webServiceUrl", "publicUrl", "host"),
                  "region": pick(item, "region", "regionName", "location"),
              }

          def list_resources(label, candidates):
              status, payload = fetch_with_fallback(label, candidates)
              if status is None:
                  return []
              if isinstance(payload, list):
                  items = payload
              elif isinstance(payload, dict):
                  if isinstance(payload.get("data"), list):
                      items = payload["data"]
                  elif isinstance(payload.get("results"), list):
                      items = payload["results"]
                  elif isinstance(payload.get("services"), list):
                      items = payload["services"]
                  elif isinstance(payload.get("items"), list):
                      items = payload["items"]
                  else:
                      items = [payload]
              else:
                  items = []
              return [normalize_resource(label, item) for item in items if isinstance(item, dict)]

          inventory = {
              "owner_id": owner_id,
              "web_services": list_resources(
                  "web services",
                  [
                      f"https://api.render.com/v1/owners/{owner_id}/services",
                      f"https://api.render.com/v1/services?ownerId={owner_id}",
                      f"https://api.render.com/v1/services?owner_id={owner_id}",
                  ],
              ),
              "postgresql_databases": list_resources(
                  "PostgreSQL databases",
                  [
                      f"https://api.render.com/v1/owners/{owner_id}/databases",
                      f"https://api.render.com/v1/postgres?ownerId={owner_id}",
                      f"https://api.render.com/v1/postgres?owner_id={owner_id}",
                  ],
              ),
              "background_workers": list_resources(
                  "background workers",
                  [
                      f"https://api.render.com/v1/owners/{owner_id}/background-workers",
                      f"https://api.render.com/v1/background-workers?ownerId={owner_id}",
                      f"https://api.render.com/v1/background-workers?owner_id={owner_id}",
                  ],
              ),
              "cron_jobs": list_resources(
                  "cron jobs",
                  [
                      f"https://api.render.com/v1/owners/{owner_id}/cron-jobs",
                      f"https://api.render.com/v1/cron-jobs?ownerId={owner_id}",
                      f"https://api.render.com/v1/cron-jobs?owner_id={owner_id}",
                  ],
              ),
              "environment_groups": list_resources(
                  "environment groups",
                  [
                      f"https://api.render.com/v1/owners/{owner_id}/environment-groups",
                      f"https://api.render.com/v1/environment-groups?ownerId={owner_id}",
                      f"https://api.render.com/v1/environment-groups?owner_id={owner_id}",
                  ],
              ),
          }

          print(json.dumps(inventory, indent=2, sort_keys=True))
          
          # Save inventory to file for analysis
          with open('/tmp/render-inventory.json', 'w') as f:
              json.dump(inventory, f, indent=2)
          
          print("\n[✓] Inventory saved to /tmp/render-inventory.json")
          PY

      - name: Analyze & Compare Services
        shell: python3
        run: |
          import json
          import sys
          
          # Load inventory
          with open('/tmp/render-inventory.json', 'r') as f:
              inventory = json.load(f)
          
          web_services = inventory.get('web_services', [])
          databases = inventory.get('postgresql_databases', [])
          
          # Expected configuration
          EXPECTED = {
              'repo': 'onxos/onx-intelligence-clean',
              'branch': 'main',
              'runtime': 'docker',
              'env_vars': {
                  'NODE_ENV': 'production',
                  'JWT_EXPIRATION': '24h',
                  'PORT': '10000',
              }
          }
          
          print("\n" + "="*80)
          print("ONX INTELLIGENCE SERVICE ANALYSIS")
          print("="*80)
          
          # Find services matching the pattern
          intelligence_services = [s for s in web_services if 'intelligence' in s.get('name', '').lower()]
          
          print(f"\n📊 Found {len(intelligence_services)} Intelligence service(s)")
          print(f"📦 Found {len(databases)} PostgreSQL database(s)")
          
          if len(intelligence_services) != 2:
              print(f"\n⚠️  WARNING: Expected 2 services, found {len(intelligence_services)}")
              print("\nAll web services:")
              for i, svc in enumerate(web_services, 1):
                  print(f"  {i}. {svc.get('name')} ({svc.get('status')})")
          
          # Analyze each service
          analysis = {}
          for service in intelligence_services:
              name = service.get('name', 'Unknown')
              service_id = service.get('id')
              
              print(f"\n{'─'*80}")
              print(f"SERVICE: {name}")
              print(f"{'─'*80}")
              
              # Fetch full service details
              import urllib.request
              import urllib.error
              
              api_key = sys.argv[1] if len(sys.argv) > 1 else ""
              headers = {
                  "Authorization": f"Bearer ${sys.argv[1] if len(sys.argv) > 1 else 'RENDER_API_KEY'}",
                  "Accept": "application/json",
              }
              
              score = 0
              max_score = 100
              issues = []
              warnings = []
              recommendations = []
              
              # 1. Repository Check
              repo = service.get('repository', '')
              print(f"Repository: {repo}")
              if repo == EXPECTED['repo']:
                  print(f"  ✓ Correct repository")
                  score += 25
              else:
                  print(f"  ✗ Expected: {EXPECTED['repo']}")
                  issues.append(f"Repository mismatch: {repo} != {EXPECTED['repo']}")
                  recommendations.append(f"Update service to link to {EXPECTED['repo']}")
              
              # 2. Branch Check
              branch = service.get('branch', '')
              print(f"Branch: {branch}")
              if branch == EXPECTED['branch']:
                  print(f"  ✓ Correct branch")
                  score += 25
              else:
                  print(f"  ✗ Expected: {EXPECTED['branch']}")
                  issues.append(f"Branch mismatch: {branch} != {EXPECTED['branch']}")
                  recommendations.append(f"Rebind to {EXPECTED['branch']} branch")
              
              # 3. Status Check
              status = service.get('status', '')
              print(f"Status: {status}")
              if status.lower() in ['active', 'available', 'running']:
                  print(f"  ✓ Service is active")
                  score += 15
              else:
                  print(f"  ⚠ Service status: {status}")
                  warnings.append(f"Service status is {status}")
              
              # 4. Service URL
              url = service.get('url', '')
              print(f"URL: {url}")
              if url:
                  print(f"  ✓ Service has public URL")
                  score += 10
              else:
                  issues.append("Service has no public URL")
              
              # 5. Region
              region = service.get('region', '')
              print(f"Region: {region}")
              if region:
                  print(f"  ✓ Region: {region}")
              
              analysis[name] = {
                  'service': service,
                  'score': score,
                  'issues': issues,
                  'warnings': warnings,
                  'recommendations': recommendations
              }
          
          # Decision
          print(f"\n{'='*80}")
          print("DECISION ANALYSIS")
          print(f"{'='*80}")
          
          if len(intelligence_services) == 2:
              svc1_name = intelligence_services[0].get('name')
              svc2_name = intelligence_services[1].get('name')
              
              svc1_data = analysis.get(svc1_name, {})
              svc2_data = analysis.get(svc2_name, {})
              
              svc1_score = svc1_data.get('score', 0)
              svc2_score = svc2_data.get('score', 0)
              
              print(f"\n{svc1_name}: {svc1_score}/100")
              print(f"{svc2_name}: {svc2_score}/100")
              
              if svc1_score > svc2_score:
                  recommended = svc1_name
                  consolidate = svc2_name
              elif svc2_score > svc1_score:
                  recommended = svc2_name
                  consolidate = svc1_name
              else:
                  # Same score, pick based on configuration cleanliness
                  svc1_issues = len(svc1_data.get('issues', []))
                  svc2_issues = len(svc2_data.get('issues', []))
                  recommended = svc1_name if svc1_issues <= svc2_issues else svc2_name
                  consolidate = svc2_name if svc1_issues <= svc2_issues else svc1_name
              
              print(f"\n✅ RECOMMENDATION: Keep '{recommended}'")
              print(f"⚙️  SERVICE TO CONSOLIDATE: '{consolidate}'")
              
              print(f"\n{'─'*80}")
              print(f"WHY: {recommended}")
              print(f"{'─'*80}")
              
              rec_data = analysis.get(recommended, {})
              if rec_data.get('issues'):
                  print(f"\nIssues to fix:")
                  for issue in rec_data.get('issues', []):
                      print(f"  • {issue}")
              else:
                  print(f"\n✓ No critical issues found")
              
              if rec_data.get('warnings'):
                  print(f"\nWarnings:")
                  for warning in rec_data.get('warnings', []):
                      print(f"  ⚠ {warning}")
              
              print(f"\n{'─'*80}")
              print(f"SERVICE TO CONSOLIDATE: {consolidate}")
              print(f"{'─'*80}")
              
              cons_data = analysis.get(consolidate, {})
              if cons_data.get('issues'):
                  print(f"\nIssues (will be resolved):")
                  for issue in cons_data.get('issues', []):
                      print(f"  • {issue}")
              
              print(f"\n{'─'*80}")
              print("NEXT STEPS FOR APPROVAL")
              print(f"{'─'*80}")
              print(f"\n1. ✅ Keep as official deployment: {recommended}")
              print(f"2. ⚙️  Consolidate configuration: {consolidate}")
              print(f"3. 🔧 Configuration changes needed:")
              
              changes = rec_data.get('recommendations', [])
              if changes:
                  for i, change in enumerate(changes, 1):
                      print(f"   {i}. {change}")
              
              print(f"\n4. 📝 What will remain unchanged:")
              print(f"   • ONX Platform (separate service)")
              print(f"   • Other unrelated Render services")
              print(f"   • Database attachments for other services")
              
              print(f"\n{'='*80}")
              print("⏸️  AWAITING USER APPROVAL")
              print(f"{'='*80}")
              print(f"\nPlease review above and provide approval to proceed.")
              
          else:
              print("\n❌ ERROR: Cannot proceed without exactly 2 Intelligence services")
              sys.exit(1)
