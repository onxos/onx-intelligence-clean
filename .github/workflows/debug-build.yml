name: Debug Build
on:
  workflow_dispatch:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      - name: vite build
        run: npx vite build

      - name: esbuild api/boot.ts
        run: |
          npx esbuild api/boot.ts \
            --platform=node \
            --bundle \
            --format=esm \
            --outdir=dist \
            --tsconfig=tsconfig.server.json \
            --banner:js="import{createRequire}from'module';const require=createRequire(import.meta.url);"

      - name: Check dist output
        run: ls -lh dist/

      - name: Test runtime startup
        run: |
          echo "=== Starting server ==="
          node dist/boot.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          sleep 5
          echo "--- all listening ports ---"
          ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || echo "no ss/netstat"
          echo "--- process state ---"
          ps -p $SERVER_PID -o pid,stat,comm 2>/dev/null || echo "process gone"
          echo "--- health check ---"
          curl -sf http://127.0.0.1:10000/api/trpc/health.ping 2>&1 || echo "IPv4 FAILED"
          curl -sf http://localhost:10000/api/trpc/health.ping 2>&1 || echo "localhost FAILED"
          echo "--- kill ---"
          kill $SERVER_PID 2>/dev/null
        env:
          NODE_ENV: production
          PORT: "10000"
          DATABASE_URL: "sqlite:///tmp/test.db"
          APP_ID: test
          APP_SECRET: test
          KIMI_AUTH_URL: https://auth.kimi.com
          KIMI_OPEN_URL: https://open.kimi.com
