name: Debug Build
on:
  workflow_dispatch:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm ci
        run: npm ci

      - name: vite build
        run: npx vite build

      - name: esbuild api/boot.ts
        run: |
          npx esbuild api/boot.ts \
            --platform=node \
            --bundle \
            --format=esm \
            --outdir=dist \
            --tsconfig=tsconfig.server.json \
            --banner:js="import{createRequire}from'module';const require=createRequire(import.meta.url);"

      - name: Check dist output
        run: ls -lh dist/

      - name: Test runtime startup
        run: |
          echo "=== Starting server in background ==="
          NODE_ENV=production PORT=10000 DATABASE_URL="sqlite:///tmp/test.db" APP_ID=test APP_SECRET=test KIMI_AUTH_URL=https://auth.kimi.com KIMI_OPEN_URL=https://open.kimi.com node dist/boot.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          sleep 3
          echo "=== Server stdout/stderr so far ==="
          cat /tmp/server.log || echo "(no output)"
          echo "=== Health check ==="
          curl -sf http://localhost:10000/api/trpc/health.ping 2>&1 || echo "HEALTH CHECK FAILED"
          echo "=== Killing server ==="
          kill $SERVER_PID 2>/dev/null || echo "Server already exited"
          echo "=== Full server log ==="
          cat /tmp/server.log || echo "(no output)"
